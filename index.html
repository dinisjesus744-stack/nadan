<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Capital Inspired | Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Orbitron:wght@900&display=swap" rel="stylesheet">

    <style>
        [x-cloak] { display: none !important; }
        
        :root {
            --accent: #7c3aed; /* Roxo vibrante estilo Nova Capital */
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        .font-header { font-family: 'Orbitron', sans-serif; }

        /* Background Dinâmico Estilo Nova Capital */
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-glow {
            transition: 0.4s ease;
            box-shadow: 0 0 0px rgba(124, 58, 237, 0);
        }

        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.6);
            transform: scale(1.05);
        }

        /* Card de Produto Estilo Premium */
        .card-premium {
            background: #0f0f12;
            border-bottom: 4px solid transparent;
            transition: 0.3s;
        }

        .card-premium:hover {
            border-bottom: 4px solid var(--accent);
            background: #16161d;
        }

        .text-stroke {
            -webkit-text-stroke: 1px rgba(255,255,255,0.1);
            color: transparent;
        }
    </style>
</head>
<body x-data="storeApp()">

    <nav class="fixed top-0 w-full z-50 px-6 py-5 transition-all duration-300" 
         :class="scrollY > 50 ? 'glass py-3' : 'bg-transparent'">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div @click="page = 'home'" class="cursor-pointer font-header text-2xl tracking-tighter">
                NOVA<span class="text-purple-600">CAPITAL</span>
            </div>
            
            <div class="hidden md:flex space-x-10 text-[11px] font-bold uppercase tracking-widest">
                <a @click="page = 'home'" class="cursor-pointer hover:text-purple-500 transition">Home</a>
                <a @click="page = 'loja'" class="cursor-pointer hover:text-purple-500 transition">Loja</a>
                <a href="https://discord.gg/dSD3cvS5bb" class="cursor-pointer hover:text-purple-500 transition">Comunidade</a>
                <a @click="page = 'suporte'" class="cursor-pointer hover:text-purple-500 transition">Suporte</a>
            </div>

            <button @click="page = 'loja'" class="bg-purple-600 px-6 py-2 rounded font-bold text-xs uppercase btn-glow">
                Loja Oficial
            </button>
        </div>
    </nav>

    <template x-if="page === 'home'">
        <div>
            <header class="hero-bg h-screen flex items-center justify-center text-center px-6">
                <div class="max-w-4xl">
                    <h1 class="font-header text-6xl md:text-9xl mb-4 tracking-tighter animate-pulse uppercase">
                        NOVA <span class="text-purple-600 italic">CAPITAL</span>
                    </h1>
                    <p class="text-gray-300 text-lg md:text-xl font-light tracking-widest uppercase mb-10">
                        O futuro do Roleplay começa agora.
                    </p>
                    <div class="flex flex-col md:flex-row gap-5 justify-center">
                        <button @click="page = 'loja'" class="bg-white text-black px-12 py-4 font-bold uppercase tracking-widest hover:bg-purple-600 hover:text-white transition duration-500">
                            Adquirir Benefícios
                        </button>
                        <a href="https://discord.gg/dSD3cvS5bb" class="border border-white/20 px-12 py-4 font-bold uppercase tracking-widest hover:bg-white/10 transition">
                            Entrar no Discord
                        </a>
                    </div>
                </div>
            </header>

            <section class="py-24 px-6 bg-[#050505]">
                <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-16 items-center">
                    <div>
                        <h2 class="font-header text-4xl mb-6 uppercase italic">Imersão Total</h2>
                        <p class="text-gray-400 leading-relaxed mb-6">
                            Na Nova Capital, buscamos o equilíbrio perfeito entre diversão e realismo. Sistemas exclusivos, economia balanceada e uma staff ativa para garantir o seu divertimento.
                        </p>
                        <ul class="space-y-3 text-sm font-bold uppercase text-purple-500">
                            <li>+ Sistemas de Drogas Exclusivos</li>
                            <li>+ Concessionária com +500 Carros</li>
                            <li>+ Eventos Diários</li>
                        </ul>
                    </div>
                    <div class="glass h-64 rounded-xl flex items-center justify-center border-purple-600/30">
                        <span class="text-purple-600 font-header text-2xl">[ VÍDEO DO SERVIDOR ]</span>
                    </div>
                </div>
            </section>
        </div>
    </template>

    <template x-if="page === 'loja'">
        <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
            <div class="text-center mb-16">
                <h2 class="font-header text-5xl uppercase italic mb-4">Loja <span class="text-purple-600">Oficial</span></h2>
                <div class="w-24 h-1 bg-purple-600 mx-auto"></div>
            </div>

            <div class="flex justify-center gap-4 mb-12">
                <button @click="filter = 'todos'" :class="filter === 'todos' ? 'bg-purple-600' : 'bg-white/5'" class="px-8 py-2 rounded uppercase text-[10px] font-bold tracking-widest">Todos</button>
                <button @click="filter = 'vip'" :class="filter === 'vip' ? 'bg-purple-600' : 'bg-white/5'" class="px-8 py-2 rounded uppercase text-[10px] font-bold tracking-widest">VIPs</button>
                <button @click="filter = 'coins'" :class="filter === 'coins' ? 'bg-purple-600' : 'bg-white/5'" class="px-8 py-2 rounded uppercase text-[10px] font-bold tracking-widest">Coins</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <template x-for="item in products">
                    <div x-show="filter === 'todos' || filter === item.category" 
                         class="card-premium p-8 rounded-lg flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-6">
                                <h3 class="font-header text-xl" x-text="item.name"></h3>
                                <span class="text-[10px] bg-purple-600/20 text-purple-500 px-2 py-1 rounded" x-text="item.badge"></span>
                            </div>
                            <p class="text-gray-500 text-sm mb-8 leading-relaxed italic" x-text="item.desc"></p>
                        </div>
                        <div>
                            <div class="text-3xl font-bold mb-6 text-white" x-text="'R$ ' + item.price.toFixed(2)"></div>
                            <button @click="cart = item; page = 'checkout'" 
                                    class="w-full border border-purple-600 text-purple-500 hover:bg-purple-600 hover:text-white py-4 font-bold uppercase tracking-widest transition duration-300">
                                Adquirir Agora
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </template>

    <template x-if="page === 'checkout'">
        <main class="pt-40 pb-20 px-6 max-w-xl mx-auto">
            <div class="glass p-10 rounded-lg">
                <h2 class="font-header text-2xl mb-8 uppercase italic">Finalizar Pedido</h2>
                <div class="flex justify-between border-b border-white/10 pb-4 mb-8">
                    <span class="text-gray-400 uppercase font-bold text-xs" x-text="cart.name"></span>
                    <span class="text-purple-500 font-bold" x-text="'R$ ' + cart.price.toFixed(2)"></span>
                </div>
                
                <div class="mb-8">
                    <label class="block text-[10px] uppercase font-bold text-gray-500 mb-2">ID do Discord (usuario#0000)</label>
                    <input type="text" x-model="discordID" class="w-full bg-white/5 border border-white/10 p-4 rounded focus:border-purple-600 outline-none transition">
                </div>

                <button @click="alert('Redirecionando para pagamento seguro...')" class="w-full bg-purple-600 py-4 font-bold uppercase tracking-widest btn-glow">
                    Ir para o Pagamento
                </button>
                <button @click="page = 'loja'" class="w-full mt-4 text-gray-500 text-[10px] font-bold uppercase">Voltar</button>
            </div>
        </main>
    </template>

    <footer class="py-20 border-t border-white/5 bg-[#030303] px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10">
            <div>
                <div class="font-header text-xl mb-4">NOVA<span class="text-purple-600">CAPITAL</span></div>
                <p class="text-gray-600 text-[10px] uppercase tracking-widest">© 2026 High Quality Roleplay. All rights reserved.</p>
            </div>
            <div class="flex gap-8">
                <a href="#" class="text-gray-500 hover:text-white transition uppercase text-[10px] font-bold">Termos</a>
                <a href="#" class="text-gray-500 hover:text-white transition uppercase text-[10px] font-bold">Discord</a>
                <a href="#" class="text-gray-500 hover:text-white transition uppercase text-[10px] font-bold">Contato</a>
            </div>
        </div>
    </footer>

    <div id="fake-notif" class="fixed bottom-10 right-10 z-[100] glass p-4 rounded-lg translate-x-[200%] transition-all duration-700">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-purple-600 rounded flex items-center justify-center font-bold italic">NC</div>
            <div>
                <p class="text-[10px] text-purple-400 font-bold uppercase">Novo Morador VIP</p>
                <p class="text-sm font-bold" id="notif-content">Alguém comprou!</p>
            </div>
        </div>
    </div>

    <script>
        function storeApp() {
            return {
                page: 'home',
                filter: 'todos',
                cart: null,
                discordID: '',
                scrollY: 0,
                products: [
                    { category: 'vip', name: 'VIP SUPREMO', price: 150.00, badge: 'MELHOR VALOR', desc: 'Salário de 100k, 5 carros importados, mansão e prioridade máxima.' },
                    { category: 'vip', name: 'VIP ELITE', price: 80.00, badge: 'POPULAR', desc: 'Salário de 50k, 2 carros importados e prioridade na fila.' },
                    { category: 'coins', name: '2.000.000 COINS', price: 50.00, badge: 'PROMO', desc: 'Moedas limpas entregues diretamente no seu banco.' },
                    { category: 'coins', name: '500.000 COINS', price: 20.00, badge: 'RECOMENDADO', desc: 'Ideal para comprar seu primeiro carro e casa.' }
                ],
                init() {
                    window.addEventListener('scroll', () => this.scrollY = window.scrollY);
                    
                    // Notificação Fake
                    const users = ["Mandrake", "Ghost", "Xandão", "Biel", "Vini7"];
                    const el = document.getElementById('fake-notif');
                    const content = document.getElementById('notif-content');
                    
                    setInterval(() => {
                        const u = users[Math.floor(Math.random()*users.length)];
                        content.innerText = `${u} adquiriu um VIP!`;
                        el.classList.remove('translate-x-[200%]');
                        setTimeout(() => el.classList.add('translate-x-[200%]'), 5000);
                    }, 25000);
                }
            }
        }
    </script>
</body>
</html>
